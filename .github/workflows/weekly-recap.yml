name: Weekly Recap
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:        # Manual trigger

jobs:
  recap:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      pull-requests: read
    steps:
      - uses: ekreloff/repo-recap@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          days: 7
